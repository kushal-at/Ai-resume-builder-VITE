<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered resume builder with multiple premium templates, real-time preview, and PDF export. Built with Vite and Vanilla JS." />
    <title>AI Resume Builder — Create Professional Resumes Instantly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo-container">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <span class="logo-text">ResumeAI</span>
        </div>

        <div class="header-controls">
          <select id="template-select" class="select-input">
            <option value="modern">Modern</option>
            <option value="professional">Professional</option>
            <option value="creative">Creative</option>
            <option value="elegant">Elegant</option>
            <option value="compact">Compact</option>
          </select>

          <button id="theme-toggle-btn" class="btn btn-secondary btn-icon-only" title="Toggle Theme">
            <svg data-lucide="moon" width="18" height="18"></svg>
          </button>

          <button id="settings-open-btn" class="btn btn-secondary" title="API Settings">
            <svg data-lucide="settings" width="16" height="16"></svg>
            <span>API</span>
          </button>

          <button id="export-pdf-btn" class="btn btn-primary">
            <svg data-lucide="download" width="16" height="16"></svg>
            <span>PDF</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="editor-pane" id="editor-container"></section>

        <section class="preview-pane">
          <div class="preview-controls">
            <span class="scale-label">Zoom</span>
            <input type="range" id="preview-scale-slider" min="40" max="120" value="80" style="accent-color: var(--accent); cursor: pointer; width: 100px;">
            <span id="preview-scale-value" style="font-size: 0.72rem; font-weight: 600; color: var(--text-primary); min-width: 32px;">80%</span>
          </div>
          <div class="resume-container" id="resume-wrapper">
            <div class="resume-sheet" id="resume-sheet-target"></div>
          </div>
        </section>
      </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
      <div class="modal-container">
        <div class="modal-header">
          <h2 class="modal-title">API Settings</h2>
          <button class="modal-close" id="settings-close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="api-instructions">
            This app uses <strong>OpenRouter</strong> for AI features. Your key is stored locally and never shared.
            Get a key at <a href="https://openrouter.ai/" target="_blank">openrouter.ai</a>.
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="openrouter-key-input" placeholder="sk-or-v1-..." style="font-family: monospace;">
          </div>
          <div class="form-group">
            <label>Model</label>
            <select id="openrouter-model-select" class="select-input" style="width: 100%;">
              <option value="meta-llama/llama-3-8b-instruct:free">Llama 3 8B (Free)</option>
              <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
              <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
              <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="settings-cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="settings-save-btn">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
